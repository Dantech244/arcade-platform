<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1">
<title>Puissance 4 — RetroForge</title>
<link rel="stylesheet" href="../css/global.css">
<link rel="stylesheet" href="../css/modules/connect4.css">
</head>
<body class="crt-flicker">
  <div class="crt-overlay"></div>
  <div class="game-screen">
    <div class="game-topbar">
      <a class="back" href="../index.html">&larr; Retour au hall</a>
      <span class="game-title">PUISSANCE 4</span>
      <span></span>
    </div>
    <div class="hud">
      <span>AU TOUR DE : <b id="hudTurn">Toi</b></span>
      <span>MEILLEUR RESULTAT : <b id="hudBest">0</b></span>
      <span>MOYENNE : <b id="hudAvg">0</b></span>
      <span>TEMPS : <b id="hudTime">0:00</b></span>
    </div>
    <div class="canvas-wrap">
      <canvas id="gameCanvas"></canvas>
      <div class="overlay-msg" id="overlay">
        <h2 id="overlayTitle">PUISSANCE 4</h2>
        <p id="overlayMsg">Choisis ton mode puis clique/tape une colonne</p>
      </div>
    </div>
    <div class="game-options">
      <label>Mode :
        <select id="modeSelect">
          <option value="ai">Solo vs IA</option>
          <option value="2p">2 Joueurs</option>
        </select>
      </label>
      <span>Clic/tap sur une colonne, ou touches 1-7</span>
    </div>
  </div>

  <script src="../js/hub.js"></script>
  <script>window.RETROFORGE_ASSET_BASE = "../assets/";</script>
  <script src="../js/playlist.js"></script>
  <script src="../js/engines/connect4.js"></script>
</body>
</html>
