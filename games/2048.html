<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1">
<title>2048 — RetroForge</title>
<link rel="stylesheet" href="../css/global.css">
<link rel="stylesheet" href="../css/modules/2048.css">
</head>
<body class="crt-flicker">
  <div class="crt-overlay"></div>
  <div class="game-screen">
    <div class="game-topbar">
      <a class="back" href="../index.html">&larr; Retour au hall</a>
      <span class="game-title">2048</span>
      <span></span>
    </div>
    <div class="hud">
      <span>SCORE : <b id="hudScore">0</b></span>
      <span>RECORD : <b id="hudBest">0</b></span>
      <span>MOYENNE : <b id="hudAvg">0</b></span>
      <span>TEMPS : <b id="hudTime">0:00</b></span>
    </div>
    <div class="canvas-wrap">
      <div id="board2048"></div>
      <div class="overlay-msg" id="overlay">
        <h2 id="overlayTitle">2048</h2>
        <p id="overlayMsg">Appuie sur une touche pour demarrer</p>
      </div>
    </div>
    <div class="game-options">
      <span>Controles : ZQSD / WASD / fleches, ou glisser sur mobile</span>
    </div>
  </div>

  <script src="../js/hub.js"></script>
  <script>window.RETROFORGE_ASSET_BASE = "../assets/";</script>
  <script src="../js/playlist.js"></script>
  <script src="../js/engines/2048.js"></script>
</body>
</html>
