<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1">
<title>Space Invaders — RetroForge</title>
<link rel="stylesheet" href="../css/global.css">
<link rel="stylesheet" href="../css/mobile-controls.css">
<link rel="stylesheet" href="../css/modules/space-invaders.css">
</head>
<body class="crt-flicker">
  <div class="crt-overlay"></div>
  <div class="game-screen">
    <div class="game-topbar">
      <a class="back" href="../index.html">&larr; Retour au hall</a>
      <span class="game-title">SPACE INVADERS</span>
      <span></span>
    </div>
    <div class="hud">
      <span>SCORE : <b id="hudScore">0</b></span>
      <span>VAGUE : <b id="hudWave">1</b></span>
      <span>VIES : <b id="hudLives">3</b></span>
      <span>RECORD : <b id="hudBest">0</b></span>
      <span>MOYENNE : <b id="hudAvg">0</b></span>
      <span>TEMPS : <b id="hudTime">0:00</b></span>
    </div>
    <div class="canvas-wrap">
      <canvas id="gameCanvas"></canvas>
      <div class="overlay-msg" id="overlay">
        <h2 id="overlayTitle">SPACE INVADERS</h2>
        <p id="overlayMsg">Appuie sur une touche pour demarrer</p>
      </div>
    </div>
    <div class="game-options">
      <span>Controles : Q/D deplacer, ESPACE/Z tirer</span>
    </div>
  </div>

  <div class="touch-controls" id="touchControls">
    <div class="dpad" style="grid-template-columns: repeat(2, 52px); grid-template-rows: 52px;">
      <button data-dir="left" aria-label="Gauche" style="grid-column:1;grid-row:1;">◀</button>
      <button data-dir="right" aria-label="Droite" style="grid-column:2;grid-row:1;">▶</button>
    </div>
    <div class="action-pad">
      <button data-action="fire" aria-label="Tirer">TIR</button>
    </div>
  </div>

  <script src="../js/hub.js"></script>
  <script>window.RETROFORGE_ASSET_BASE = "../assets/";</script>
  <script src="../js/playlist.js"></script>
  <script src="../js/engines/space-invaders.js"></script>
</body>
</html>
